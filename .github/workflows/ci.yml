name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Backend
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Build Backend
      working-directory: ./backend
      run: npm run build

    # Frontend
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
      
    # Example of how you would run tests if you had them
    # - name: Run Backend Tests
    #   working-directory: ./backend
    #   run: npm test
    #
    # - name: Run Frontend Tests
    #   working-directory: ./frontend
    #   run: npm test

    - name: Verify Build
      run: echo "Build successful! Application is ready for deployment."
